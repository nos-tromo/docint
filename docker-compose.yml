##########################################################
# Shared backend fragments (YAML anchors)
##########################################################
x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

x-base-image-build-args: &base-image-build-args
  PYTHON_SLIM_BOOKWORM_IMAGE: ${PYTHON_SLIM_BOOKWORM_IMAGE:-python:3.11-slim-bookworm}
  PYTHON_SLIM_IMAGE: ${PYTHON_SLIM_IMAGE:-python:3.11-slim}
  NVIDIA_CUDA_RUNTIME_IMAGE: ${NVIDIA_CUDA_RUNTIME_IMAGE:-nvidia/cuda:13.0.2-cudnn-runtime-ubuntu22.04}

x-build-args: &build-args
  <<: [*proxy-build-args, *base-image-build-args]

x-docker-env-file: &docker-env-file
  - .env.docker

x-backend-cpu: &backend-cpu
  build:
    context: .
    dockerfile: Dockerfile.backend.cpu
    args:
      <<: *build-args
  ports: &backend-ports
    - 8000:8000
  environment: &backend-cpu-env
    LOG_PATH: /var/log/docint/backend-cpu.log
    QDRANT_HOST: http://qdrant:6333
    QDRANT_SRC_DIR: /var/lib/docint/sources
    SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
    USE_DEVICE: ${USE_DEVICE:-auto}
  env_file: *docker-env-file
  volumes: &backend-volumes
    - docint-logs:/var/log/docint
    - docling-cache:/root/.cache/docling
    - huggingface-cache:/root/.cache/huggingface/hub
    - qdrant-sources:/var/lib/docint/sources
    - sessions-storage:/var/lib/docint/sessions
    - whisper-cache:/root/.cache/whisper
  networks: &backend-net
    docint-net:
      aliases:
        - backend-net
    proxy-net:
      aliases:
        - docint-backend

x-backend-cuda: &backend-cuda
  build:
    context: .
    dockerfile: Dockerfile.backend.cuda
    args:
      <<: *build-args
  ports: *backend-ports
  gpus: all
  environment: &backend-cuda-env
    LOG_PATH: /var/log/docint/backend-cuda.log
    NVIDIA_VISIBLE_DEVICES: all
    QDRANT_HOST: http://qdrant:6333
    QDRANT_SRC_DIR: /var/lib/docint/sources
    SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
    USE_DEVICE: ${USE_DEVICE:-auto}
  env_file: *docker-env-file
  volumes: *backend-volumes
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [cuda]
  networks: *backend-net

x-qdrant-common: &qdrant-common
  ports:
    - 6333:6333
    - 6334:6334
  env_file: *docker-env-file
  environment: &qdrant-common-env
    QDRANT__TELEMETRY_DISABLED: "true"
  volumes: &qdrant-volumes
    - qdrant-snapshots:/qdrant/snapshots
    - qdrant-storage:/qdrant/storage
  restart: unless-stopped
  networks:
    docint-net:
      aliases:
        - qdrant

x-qdrant-cpu: &qdrant-cpu
  <<: *qdrant-common
  image: qdrant/qdrant:v1.17.0

x-qdrant-cuda: &qdrant-cuda
  <<: *qdrant-common
  image: qdrant/qdrant:v1.17.0-gpu-nvidia
  gpus: all
  environment:
    <<: *qdrant-common-env
    NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    NVIDIA_VISIBLE_DEVICES: all
    QDRANT__GPU__INDEXING: "1"
  deploy: &cuda-deploy
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  ##########################################################
  # Backend – CPU + Ollama
  ##########################################################
  backend-cpu-ollama:
    <<: *backend-cpu
    profiles: ["cpu-ollama"]
    depends_on:
      - ollama-cpu
      - qdrant
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: ollama
      OPENAI_API_BASE: http://ollama-server:11434/v1

  ##########################################################
  # Backend – CPU + External OpenAI API
  ##########################################################
  backend-cpu-openai:
    <<: *backend-cpu
    profiles: ["cpu-openai"]
    depends_on:
      - qdrant
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: openai
      OPENAI_API_BASE: https://api.openai.com/v1

  ##########################################################
  # Backend – CUDA + Ollama
  ##########################################################
  backend-cuda-ollama:
    <<: *backend-cuda
    profiles: ["cuda-ollama"]
    depends_on:
      - ollama-cuda
      - qdrant-cuda
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: ollama
      OPENAI_API_BASE: http://ollama-server:11434/v1

  ##########################################################
  # Backend – CUDA + External OpenAI API
  ##########################################################
  backend-cuda-openai:
    <<: *backend-cuda
    profiles: ["cuda-openai"]
    depends_on:
      - qdrant-cuda
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: openai
      OPENAI_API_BASE: https://api.openai.com/v1

  ##########################################################
  # Backend – External vLLM
  ##########################################################
  backend-cpu-vllm:
    <<: *backend-cpu
    profiles: ["cpu-vllm"]
    depends_on:
      - qdrant
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: vllm
      OPENAI_API_BASE: ${OPENAI_API_BASE:?OPENAI_API_BASE must point to the external vLLM router /v1 endpoint}

  backend-cuda-vllm:
    <<: *backend-cuda
    profiles: ["cuda-vllm"]
    depends_on:
      - qdrant-cuda
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: vllm
      OPENAI_API_BASE: ${OPENAI_API_BASE:?OPENAI_API_BASE must point to the external vLLM router /v1 endpoint}

  ##########################################################
  # Ollama (CPU)
  ##########################################################
  ollama-cpu:
    profiles: ["cpu-ollama"]
    image: ollama/ollama:0.17.7
    env_file: *docker-env-file
    environment: &ollama-env
      OLLAMA_HOST: 0.0.0.0
    volumes: &ollama-volumes
      - ollama-cache:/root/.ollama
    healthcheck: &ollama-healthcheck
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks: &ollama-net
      docint-net:
        aliases:
          - ollama-server

  ##########################################################
  # Ollama (CUDA)
  ##########################################################
  ollama-cuda:
    profiles: ["cuda-ollama"]
    image: ollama/ollama:0.17.7
    gpus: all
    env_file: *docker-env-file
    environment:
      <<: *ollama-env
      NVIDIA_VISIBLE_DEVICES: all
    volumes: *ollama-volumes
    healthcheck: *ollama-healthcheck
    deploy: *cuda-deploy
    restart: unless-stopped
    networks: *ollama-net

  ##########################################################
  # Frontend (Streamlit)
  ##########################################################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        <<: *build-args
    command: streamlit run docint/app.py --server.address 0.0.0.0
    ports:
      - 8501:8501
    env_file: *docker-env-file
    environment:
      BACKEND_HOST: http://backend-net:8000
      BACKEND_PUBLIC_HOST: http://localhost:8000
      LOG_PATH: /var/log/docint/frontend.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - docint-logs:/var/log/docint
    networks:
      docint-net:
      proxy-net:
        aliases:
          - docint-frontend

  ##########################################################
  # Qdrant
  ##########################################################
  qdrant:
    <<: *qdrant-cpu
    profiles: ["cpu-ollama", "cpu-openai", "cpu-vllm"]

  qdrant-cuda:
    <<: *qdrant-cuda
    profiles: ["cuda-ollama", "cuda-openai", "cuda-vllm"]

##########################################################
# Volumes
##########################################################
volumes:
  docint-logs:
  docling-cache:
    external: true
  huggingface-cache:
    external: true
  ollama-cache:
    external: true
  qdrant-snapshots:
  qdrant-sources:
  qdrant-storage:
  sessions-storage:
  whisper-cache:
    external: true

##########################################################
# Networks
##########################################################
networks:
  docint-net:
  proxy-net:
    external: true
    name: ${PROXY_NETWORK:-proxy-net}
