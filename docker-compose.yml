##########################################################
# Shared backend fragments (YAML anchors)
##########################################################
x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

x-base-image-build-args: &base-image-build-args
  PYTHON_SLIM_BOOKWORM_IMAGE: ${PYTHON_SLIM_BOOKWORM_IMAGE:-python:3.11.12-slim-bookworm}
  NVIDIA_CUDA_RUNTIME_IMAGE: ${NVIDIA_CUDA_RUNTIME_IMAGE:-nvidia/cuda:12.8.1-cudnn-runtime-ubuntu22.04}

x-build-args: &build-args
  <<: [*proxy-build-args, *base-image-build-args]

x-env-file: &env-file
  - .env

services:
  ##########################################################
  # Backend – CPU
  ##########################################################
  backend-cpu:
    build:
      context: .
      dockerfile: Dockerfile.backend.cpu
      args:
        <<: *build-args
    ports: &backend-ports
      - 8000:8000
    environment:
      LOG_PATH: /var/log/docint/backend-cpu.log
      QDRANT_HOST: http://qdrant:6333
      QDRANT_SRC_DIR: /var/lib/docint/sources
      SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
      USE_DEVICE: ${USE_DEVICE:-cpu}
    env_file: *env-file
    volumes: &backend-volumes
      - docint-logs:/var/log/docint
      - docling-cache:/root/.cache/docling
      - huggingface-cache:/root/.cache/huggingface/hub
      - qdrant-sources:/var/lib/docint/sources
      - sessions-storage:/var/lib/docint/sessions
    networks: &backend-networks
      docint-net:
        aliases:
          - backend
      inference-net:
        aliases:
          - docint-backend
    depends_on:
      - qdrant-cpu
    profiles: ["cpu"]

  ##########################################################
  # Backend – CUDA
  ##########################################################
  backend-cuda:
    build:
      context: .
      dockerfile: Dockerfile.backend.cuda
      args:
        <<: *build-args
    ports: *backend-ports
    environment:
      LOG_PATH: /var/log/docint/backend-cuda.log
      NVIDIA_VISIBLE_DEVICES: all
      QDRANT_HOST: http://qdrant:6333
      QDRANT_SRC_DIR: /var/lib/docint/sources
      SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
      USE_DEVICE: ${USE_DEVICE:-auto}
    env_file: *env-file
    volumes: *backend-volumes
    networks: *backend-networks
    depends_on:
      - qdrant-cuda
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [cuda]
    profiles: ["cuda"]

  ##########################################################
  # Frontend – CPU
  ##########################################################
  frontend-cpu:
    build: &frontend-build
      context: .
      dockerfile: Dockerfile.frontend
      args:
        <<: *build-args
    ports: &frontend-ports
      - ${DOCINT_HOST_PORT:-8501}:8501
    environment:
      BACKEND_HOST: http://backend:8000
      BACKEND_PUBLIC_HOST: http://localhost:8000
      LOG_PATH: /var/log/docint/frontend-cpu.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    env_file: *env-file
    volumes: &frontend-volumes
      - docint-logs:/var/log/docint
    networks: &frontend-networks
      docint-net:
    depends_on:
      - backend-cpu
    profiles: ["cpu"]

  ##########################################################
  # Frontend – CUDA
  ##########################################################
  frontend-cuda:
    build: *frontend-build
    ports: *frontend-ports
    environment: 
      BACKEND_HOST: http://backend:8000
      BACKEND_PUBLIC_HOST: http://localhost:8000
      LOG_PATH: /var/log/docint/frontend-cuda.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    env_file: *env-file
    volumes: *frontend-volumes
    networks: *frontend-networks
    depends_on:
      - backend-cuda
    profiles: ["cuda"]

  ##########################################################
  # Qdrant – CPU
  ##########################################################
  qdrant-cpu:
    image: qdrant/qdrant:v1.17.0
    ports: &qdrant-ports
      - 6333:6333
      - 6334:6334
    environment: &qdrant-common-env
      QDRANT__TELEMETRY_DISABLED: "true"
    env_file: *env-file
    volumes: &qdrant-volumes
      - qdrant-snapshots:/qdrant/snapshots
      - qdrant-storage:/qdrant/storage
    networks: &qdrant-networks
      docint-net:
        aliases:
          - qdrant
    restart: &qdrant-restart unless-stopped
    profiles: ["cpu"]

  ##########################################################
  # Qdrant – CUDA
  ##########################################################
  qdrant-cuda:
    image: qdrant/qdrant:v1.17.0-gpu-nvidia
    ports: *qdrant-ports
    environment:
      <<: *qdrant-common-env
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      NVIDIA_VISIBLE_DEVICES: all
      QDRANT__GPU__INDEXING: "1"
    env_file: *env-file
    volumes: *qdrant-volumes
    networks: *qdrant-networks
    restart: *qdrant-restart
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["cuda"]

##########################################################
# Volumes
##########################################################
volumes:
  docint-logs:
  docling-cache:
    external: true
  huggingface-cache:
    external: true
  ollama-cache:
    external: true
  qdrant-snapshots:
  qdrant-sources:
  qdrant-storage:
  sessions-storage:

##########################################################
# Networks
##########################################################
networks:
  docint-net:
  inference-net:
    external: true
    name: ${INFERENCE_NET:-inference-net}
