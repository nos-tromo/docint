name: docint

##########################################################
# Shared backend fragments (YAML anchors)
##########################################################
x-no-proxy-env: &no-proxy-env
  NO_PROXY: "backend,qdrant,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "backend,qdrant,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - .env

services:
  ##########################################################
  # Backend – CPU
  ##########################################################
  backend-cpu:
    image: docint-backend-cpu:${DOCINT_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend.cpu
    ports: &backend-ports
      - 8000:8000
    environment:
      <<: *no-proxy-env
      LOG_PATH: /var/log/docint/backend-cpu.log
      QDRANT_HOST: http://qdrant:6333
      QDRANT_SRC_DIR: /var/lib/docint/sources
      SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
      USE_DEVICE: ${USE_DEVICE:-cpu}
    env_file: *env-file
    volumes: &backend-volumes
      - docint-logs:/var/log/docint
      - docling-cache:/root/.cache/docling
      - huggingface-cache:/root/.cache/huggingface/hub
      - qdrant-sources:/var/lib/docint/sources
      - sessions-storage:/var/lib/docint/sessions
    networks: &backend-networks
      docint-net:
        aliases:
          - backend
      inference-net:
        aliases:
          - docint-backend
    depends_on:
      - qdrant-cpu
    profiles: ["cpu"]

  ##########################################################
  # Backend – CUDA
  ##########################################################
  backend-cuda:
    image: docint-backend-cuda:${DOCINT_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.backend.cuda
    ports: *backend-ports
    environment:
      <<: *no-proxy-env
      LOG_PATH: /var/log/docint/backend-cuda.log
      NVIDIA_VISIBLE_DEVICES: all
      QDRANT_HOST: http://qdrant:6333
      QDRANT_SRC_DIR: /var/lib/docint/sources
      SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
      USE_DEVICE: ${USE_DEVICE:-auto}
    env_file: *env-file
    volumes: *backend-volumes
    networks: *backend-networks
    depends_on:
      - qdrant-cuda
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [cuda]
    profiles: ["cuda"]

  ##########################################################
  # Frontend – CPU
  ##########################################################
  frontend-cpu:
    image: docint-frontend-cpu:${DOCINT_VERSION:-latest}
    build: &frontend-build
      context: .
      dockerfile: Dockerfile.frontend
    ports: &frontend-ports
      - ${DOCINT_HOST_PORT:-8501}:8501
    environment:
      <<: *no-proxy-env
      BACKEND_HOST: http://backend:8000
      BACKEND_PUBLIC_HOST: http://localhost:8000
      LOG_PATH: /var/log/docint/frontend-cpu.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    env_file: *env-file
    volumes: &frontend-volumes
      - docint-logs:/var/log/docint
    networks: &frontend-networks
      docint-net:
    depends_on:
      - backend-cpu
    profiles: ["cpu"]

  ##########################################################
  # Frontend – CUDA
  ##########################################################
  frontend-cuda:
    image: docint-frontend-cuda:${DOCINT_VERSION:-latest}
    build: *frontend-build
    ports: *frontend-ports
    environment:
      <<: *no-proxy-env
      BACKEND_HOST: http://backend:8000
      BACKEND_PUBLIC_HOST: http://localhost:8000
      LOG_PATH: /var/log/docint/frontend-cuda.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    env_file: *env-file
    volumes: *frontend-volumes
    networks: *frontend-networks
    depends_on:
      - backend-cuda
    profiles: ["cuda"]

  ##########################################################
  # Qdrant – CPU
  ##########################################################
  qdrant-cpu:
    image: docker.io/qdrant/qdrant:v1.17.0@sha256:f1c7272cdac52b38c1a0e89313922d940ba50afd90d593a1605dbbc214e66ffb
    ports: &qdrant-ports
      - 6333:6333
      - 6334:6334
    environment: &qdrant-common-env
      QDRANT__TELEMETRY_DISABLED: "true"
    env_file: *env-file
    volumes: &qdrant-volumes
      - qdrant-snapshots:/qdrant/snapshots
      - qdrant-storage:/qdrant/storage
    networks: &qdrant-networks
      docint-net:
        aliases:
          - qdrant
    restart: &qdrant-restart unless-stopped
    profiles: ["cpu"]

  ##########################################################
  # Qdrant – CUDA
  ##########################################################
  qdrant-cuda:
    image: docker.io/qdrant/qdrant:v1.17.0-gpu-nvidia@sha256:5315819b0721f5211ccb432c6949e81c56bdcf63cab33b4dec45f42126970bde
    ports: *qdrant-ports
    environment:
      <<: *qdrant-common-env
      NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
      NVIDIA_VISIBLE_DEVICES: all
      QDRANT__GPU__INDEXING: "1"
    env_file: *env-file
    volumes: *qdrant-volumes
    networks: *qdrant-networks
    restart: *qdrant-restart
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["cuda"]

##########################################################
# Volumes
##########################################################
volumes:
  docint-logs:
  docling-cache:
    external: true
  huggingface-cache:
    external: true
  ollama-cache:
    external: true
  qdrant-snapshots:
  qdrant-sources:
  qdrant-storage:
  sessions-storage:

##########################################################
# Networks
##########################################################
networks:
  docint-net:
  inference-net:
    external: true
    name: ${INFERENCE_NET:-inference-net}
