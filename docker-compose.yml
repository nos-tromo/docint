##########################################################
# Shared backend fragments (YAML anchors)
##########################################################
x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}

x-base-image-build-args: &base-image-build-args
  PYTHON_SLIM_BOOKWORM_IMAGE: ${PYTHON_SLIM_BOOKWORM_IMAGE:-python:3.11-slim-bookworm}
  PYTHON_SLIM_IMAGE: ${PYTHON_SLIM_IMAGE:-python:3.11-slim}
  NVIDIA_CUDA_RUNTIME_IMAGE: ${NVIDIA_CUDA_RUNTIME_IMAGE:-nvidia/cuda:13.0.2-cudnn-runtime-ubuntu22.04}
  VLLM_OPENAI_IMAGE: ${VLLM_OPENAI_IMAGE:-vllm/vllm-openai:v0.17.1}

x-build-args: &build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-}
  http_proxy: ${http_proxy:-}
  https_proxy: ${https_proxy:-}
  no_proxy: ${no_proxy:-}
  PYTHON_SLIM_BOOKWORM_IMAGE: ${PYTHON_SLIM_BOOKWORM_IMAGE:-python:3.11-slim-bookworm}
  PYTHON_SLIM_IMAGE: ${PYTHON_SLIM_IMAGE:-python:3.11-slim}
  NVIDIA_CUDA_RUNTIME_IMAGE: ${NVIDIA_CUDA_RUNTIME_IMAGE:-nvidia/cuda:13.0.2-cudnn-runtime-ubuntu22.04}
  VLLM_OPENAI_IMAGE: ${VLLM_OPENAI_IMAGE:-vllm/vllm-openai:v0.17.1}

x-docker-env-file: &docker-env-file
  - .env.docker

x-backend-cpu: &backend-cpu
  build:
    context: .
    dockerfile: Dockerfile.backend.cpu
    args:
      <<: *build-args
  ports: &backend-ports
    - 8000:8000
  environment: &backend-cpu-env
    LOG_PATH: /var/log/docint/backend-cpu.log
    QDRANT_HOST: http://qdrant:6333
    QDRANT_SRC_DIR: /qdrant/storage/sources
    SESSIONS_PATH: /var/lib/docint/sessions/sessions.db
    USE_DEVICE: auto
  env_file: *docker-env-file
  volumes: &backend-volumes
    - docint-logs:/var/log/docint
    - docling-cache:/root/.cache/docling
    - huggingface-cache:/root/.cache/huggingface/hub
    - qdrant-storage:/qdrant/storage
    - sessions-storage:/var/lib/docint/sessions/
    - whisper-cache:/root/.cache/whisper
  networks: &backend-net
    docint-net:
      aliases:
        - backend-net

x-backend-cuda: &backend-cuda
  build:
    context: .
    dockerfile: Dockerfile.backend.cuda
    args:
      <<: *build-args
  ports: *backend-ports
  gpus: all
  environment: &backend-cuda-env
    LOG_PATH: /var/log/docint/backend-cuda.log
    NVIDIA_VISIBLE_DEVICES: all
    QDRANT_HOST: http://qdrant:6333
    QDRANT_SRC_DIR: /qdrant/storage/sources
    SESSIONS_PATH: /var/lib/docint/sessions/sessions.db
    USE_DEVICE: auto
  env_file: *docker-env-file
  volumes: *backend-volumes
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [cuda]
  networks: *backend-net

x-qdrant-common: &qdrant-common
  ports:
    - 6333:6333
    - 6334:6334
  env_file: *docker-env-file
  environment: &qdrant-common-env
    QDRANT__TELEMETRY_DISABLED: "true"
  volumes: &qdrant-volumes
    - qdrant-snapshots:/qdrant/snapshots
    - qdrant-storage:/qdrant/storage
  restart: unless-stopped
  networks:
    docint-net:
      aliases:
        - qdrant

x-qdrant-cpu: &qdrant-cpu
  <<: *qdrant-common
  image: qdrant/qdrant:v1.17.0

x-qdrant-cuda: &qdrant-cuda
  <<: *qdrant-common
  image: qdrant/qdrant:v1.17.0-gpu-nvidia
  gpus: all
  environment:
    <<: *qdrant-common-env
    NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    NVIDIA_VISIBLE_DEVICES: all
    QDRANT__GPU__INDEXING: "1"
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  ##########################################################
  # Backend – CPU + Ollama
  ##########################################################
  backend-cpu-ollama:
    <<: *backend-cpu
    profiles: ["cpu-ollama"]
    depends_on:
      - ollama-cpu
      - qdrant
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: ollama
      OPENAI_API_BASE: http://ollama-server:11434/v1

  ##########################################################
  # Backend – CPU + External OpenAI API
  ##########################################################
  backend-cpu-openai:
    <<: *backend-cpu
    profiles: ["cpu-openai"]
    depends_on:
      - qdrant
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: openai
      OPENAI_API_BASE: https://api.openai.com/v1

  ##########################################################
  # Backend – CUDA + Ollama
  ##########################################################
  backend-cuda-ollama:
    <<: *backend-cuda
    profiles: ["cuda-ollama"]
    depends_on:
      - ollama-cuda
      - qdrant-cuda
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: ollama
      OPENAI_API_BASE: http://ollama-server:11434/v1

  ##########################################################
  # Backend – CUDA + External OpenAI API
  ##########################################################
  backend-cuda-openai:
    <<: *backend-cuda
    profiles: ["cuda-openai"]
    depends_on:
      - qdrant-cuda
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: openai
      OPENAI_API_BASE: https://api.openai.com/v1

  ##########################################################
  # Backend – CUDA + vLLM
  ##########################################################
  backend-cuda-vllm:
    <<: *backend-cuda
    profiles: ["cuda-vllm"]
    depends_on:
      - vllm-router
      - qdrant-cuda
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: vllm
      OPENAI_API_BASE: http://vllm-router:9000/v1

  ##########################################################
  # Ollama (CPU)
  ##########################################################
  ollama-cpu:
    profiles: ["cpu-ollama"]
    image: ollama/ollama:0.17.7
    env_file: *docker-env-file
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-cache:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      docint-net:
        aliases:
          - ollama-server

  ##########################################################
  # Ollama (CUDA)
  ##########################################################
  ollama-cuda:
    profiles: ["cuda-ollama"]
    image: ollama/ollama:0.17.7
    gpus: all
    env_file: *docker-env-file
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-cache:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      docint-net:
        aliases:
          - ollama-server

  ##########################################################
  # vLLM Router (CUDA)
  ##########################################################
  vllm-router:
    profiles: ["cuda-vllm"]
    image: nginx:1.28.2-alpine
    env_file: *docker-env-file
    depends_on:
      - vllm-chat-cuda
      - vllm-embed-cuda
      - vllm-rerank-cuda
    volumes:
      - ./nginx.vllm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      docint-net:
        aliases:
          - vllm-router
    restart: unless-stopped

  ##########################################################
  # vLLM Chat (CUDA)
  # Requires model artifacts to already exist in the shared cache volume when
  # HF_HUB_OFFLINE / TRANSFORMERS_OFFLINE are enabled.
  ##########################################################
  vllm-chat-cuda:
    profiles: ["cuda-vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
      args:
        <<: *build-args
    image: docint-vllm-openai:v0.17.1
    gpus: all
    env_file: *docker-env-file
    ipc: host
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        export CUDA_VISIBLE_DEVICES="$${CHAT_CUDA_VISIBLE_DEVICES:-0}";
        set -- vllm serve "$${TEXT_MODEL:-$${LLM:-Qwen/Qwen3.5-2B}}"
        --tensor-parallel-size "$${TENSOR_PARALLEL_SIZE:-1}"
        --api-key "$${OPENAI_API_KEY:-sk-no-key-required}"
        --host 0.0.0.0
        --port 8000
        --gpu-memory-utilization "$${CHAT_GPU_MEMORY_UTILIZATION:-0.5}"
        --max-model-len "$${OPENAI_CTX_WINDOW:-$${CHAT_MAX_MODEL_LEN:-8192}}"
        --max-num-seqs "$${CHAT_MAX_NUM_SEQS:-8}"
        --max-num-batched-tokens "$${CHAT_MAX_NUM_BATCHED_TOKENS:-16384}";
        if [ "$${CHAT_ENABLE_PREFIX_CACHING:-true}" = "true" ]; then
          set -- "$@" --enable-prefix-caching;
        fi;
        if [ -n "$${CHAT_TEMPLATE_CONTENT_FORMAT:-}" ]; then
          set -- "$@" --chat-template-content-format "$${CHAT_TEMPLATE_CONTENT_FORMAT}";
        fi;
        if [ -n "$${CHAT_DEFAULT_CHAT_TEMPLATE_KWARGS:-}" ]; then
          set -- "$@" --default-chat-template-kwargs "$${CHAT_DEFAULT_CHAT_TEMPLATE_KWARGS}";
        fi;
        if [ -n "$${CHAT_LIMIT_MM_PER_PROMPT:-}" ]; then
          set -- "$@" --limit-mm-per-prompt "$${CHAT_LIMIT_MM_PER_PROMPT}";
        fi;
        exec "$@"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-1}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-1}"
    volumes:
      - huggingface-cache:/root/.cache/huggingface/hub

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      docint-net:
        aliases:
          - vllm-chat
    restart: unless-stopped

  ##########################################################
  # vLLM Embeddings (CUDA)
  # Requires model artifacts to already exist in the shared cache volume when
  # HF_HUB_OFFLINE / TRANSFORMERS_OFFLINE are enabled.
  ##########################################################
  vllm-embed-cuda:
    profiles: ["cuda-vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
      args:
        <<: *build-args
    image: docint-vllm-openai:v0.17.1
    gpus: all
    env_file: *docker-env-file
    ipc: host
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        export CUDA_VISIBLE_DEVICES="$${EMBED_CUDA_VISIBLE_DEVICES:-0}";
        exec vllm serve "$${EMBED_MODEL:-BAAI/bge-m3}"
        --api-key "$${OPENAI_API_KEY:-sk-no-key-required}"
        --host 0.0.0.0
        --port 8000
        --runner "$${EMBED_RUNNER:-pooling}"
        --convert "$${EMBED_CONVERT:-embed}"
        --gpu-memory-utilization "$${EMBED_GPU_MEMORY_UTILIZATION:-0.15}"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-1}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-1}"
    volumes:
      - huggingface-cache:/root/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      docint-net:
        aliases:
          - vllm-embed
    restart: unless-stopped

  ##########################################################
  # vLLM Rerank (CUDA)
  # Requires model artifacts to already exist in the shared cache volume when
  # HF_HUB_OFFLINE / TRANSFORMERS_OFFLINE are enabled.
  ##########################################################
  vllm-rerank-cuda:
    profiles: ["cuda-vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
      args:
        <<: *build-args
    image: docint-vllm-openai:v0.17.1
    gpus: all
    env_file: *docker-env-file
    ipc: host
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        export CUDA_VISIBLE_DEVICES="$${RERANK_CUDA_VISIBLE_DEVICES:-0}";
        exec vllm serve "$${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}"
        --api-key "$${OPENAI_API_KEY:-sk-no-key-required}"
        --host 0.0.0.0
        --port 8000
        --runner "$${RERANK_RUNNER:-pooling}"
        --gpu-memory-utilization "$${RERANK_GPU_MEMORY_UTILIZATION:-0.15}"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-1}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-1}"
    volumes:
      - huggingface-cache:/root/.cache/huggingface/hub
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    networks:
      docint-net:
        aliases:
          - vllm-rerank
    restart: unless-stopped
    
  ##########################################################
  # Frontend (Streamlit)
  ##########################################################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        <<: *build-args
    command: streamlit run docint/app.py --server.address 0.0.0.0
    ports:
      - 8501:8501
    env_file: *docker-env-file
    environment:
      BACKEND_HOST: http://backend-net:8000
      BACKEND_PUBLIC_HOST: http://localhost:8000
      LOG_PATH: /var/log/docint/frontend.log
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - docint-logs:/var/log/docint
    networks:
      - docint-net

  ##########################################################
  # Qdrant
  ##########################################################
  qdrant:
    <<: *qdrant-cpu
    profiles: ["cpu-ollama", "cpu-openai"]

  qdrant-cuda:
    <<: *qdrant-cuda
    profiles: ["cuda-ollama", "cuda-openai", "cuda-vllm"]

##########################################################
# Volumes
##########################################################
volumes:
  docint-logs:
  docling-cache:
  huggingface-cache:
  ollama-cache:
  qdrant-snapshots:
  qdrant-storage:
  sessions-storage:
  whisper-cache:

##########################################################
# Networks
##########################################################
networks:
  docint-net:
