##########################################################
# Shared backend fragments (YAML anchors)
##########################################################
x-backend-cpu: &backend-cpu
  build:
    context: .
    dockerfile: Dockerfile.backend.cpu
  ports: &backend-ports
    - 8000:8000
  environment: &backend-cpu-env
    DATA_PATH: /app/data
    LOG_PATH: /app/.logs/backend-cpu.log
    QDRANT_HOST: http://qdrant:6333
    QDRANT_SRC_DIR: /qdrant/storage/sources
    QUERIES_PATH: /app/data/queries.txt
    RESULTS_PATH: /app/results
    USE_DEVICE: auto
  env_file:
    - .env.docker
  volumes: &backend-volumes
    - ${USERPROFILE:-$HOME}/docint/data:/app/data
    - ${USERPROFILE:-$HOME}/docint/results:/app/results
    - docint-logs:/app/.logs
    - model-cache:/root/.cache
    - qdrant-storage:/qdrant/storage
  networks: &backend-net
    docint-net:
      aliases:
        - backend-net

x-backend-cuda: &backend-cuda
  build:
    context: .
    dockerfile: Dockerfile.backend.cuda
  ports: *backend-ports
  environment: &backend-cuda-env
    DATA_PATH: /app/data/in
    LOG_PATH: /app/.logs/backend-cuda.log
    NVIDIA_VISIBLE_DEVICES: all
    QDRANT_HOST: http://qdrant:6333
    QDRANT_SRC_DIR: /qdrant/storage/sources
    QUERIES_PATH: /app/data/queries.txt
    RESULTS_PATH: /app/data/out
    USE_DEVICE: auto
  env_file:
    - .env.docker
  volumes: *backend-volumes
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            capabilities: [cuda]
  networks: *backend-net

x-qdrant-common: &qdrant-common
  ports:
    - 6333:6333
    - 6334:6334
  environment: &qdrant-common-env
    QDRANT__TELEMETRY_DISABLED: "true"
  volumes: &qdrant-volumes
    - qdrant-snapshots:/qdrant/snapshots
    - qdrant-storage:/qdrant/storage
  restart: unless-stopped
  networks:
    docint-net:
      aliases:
        - qdrant

x-qdrant-cpu: &qdrant-cpu
  <<: *qdrant-common
  image: qdrant/qdrant:latest

x-qdrant-cuda: &qdrant-cuda
  <<: *qdrant-common
  image: qdrant/qdrant:gpu-nvidia-latest
  environment:
    <<: *qdrant-common-env
    NVIDIA_DRIVER_CAPABILITIES: compute,utility,graphics
    NVIDIA_VISIBLE_DEVICES: all
    QDRANT__GPU__INDEXING: "1"
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  runtime: nvidia

services:
  ##########################################################
  # Backend – CPU + Ollama
  ##########################################################
  backend-cpu-ollama:
    <<: *backend-cpu
    profiles: ["cpu-ollama"]
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: ollama
      OPENAI_API_BASE: http://ollama-server:11434/v1

  ##########################################################
  # Backend – CPU + External OpenAI API
  ##########################################################
  backend-cpu-openai:
    <<: *backend-cpu
    profiles: ["cpu-openai"]
    environment:
      <<: *backend-cpu-env
      INFERENCE_PROVIDER: openai
      OPENAI_API_BASE: https://api.openai.com/v1

  ##########################################################
  # Backend – CUDA + Ollama
  ##########################################################
  backend-cuda-ollama:
    <<: *backend-cuda
    profiles: ["cuda-ollama"]
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: ollama
      OPENAI_API_BASE: http://ollama-server:11434/v1

  ##########################################################
  # Backend – CUDA + External OpenAI API
  ##########################################################
  backend-cuda-openai:
    <<: *backend-cuda
    profiles: ["cuda-openai"]
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: openai
      OPENAI_API_BASE: https://api.openai.com/v1

  ##########################################################
  # Backend – CUDA + vLLM
  ##########################################################
  backend-cuda-vllm:
    <<: *backend-cuda
    profiles: ["cuda-vllm"]
    depends_on:
      - vllm-router
    environment:
      <<: *backend-cuda-env
      INFERENCE_PROVIDER: vllm
      OPENAI_API_BASE: http://vllm-router:9000/v1

  ##########################################################
  # Ollama (CPU)
  ##########################################################
  ollama-cpu:
    profiles: ["cpu-ollama"]
    image: ollama/ollama:latest
    environment:
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      docint-net:
        aliases:
          - ollama-server

  ##########################################################
  # Ollama (CUDA)
  ##########################################################
  ollama-cuda:
    profiles: ["cuda-ollama"]
    image: ollama/ollama:latest
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    runtime: nvidia
    restart: unless-stopped
    networks:
      docint-net:
        aliases:
          - ollama-server

  ##########################################################
  # vLLM Router (CUDA)
  ##########################################################
  vllm-router:
    profiles: ["cuda-vllm"]
    image: nginx:1.27-alpine
    depends_on:
      - vllm-chat-cuda
      - vllm-embed-cuda
      - vllm-rerank-cuda
    volumes:
      - ./nginx.vllm.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      docint-net:
        aliases:
          - vllm-router
    restart: unless-stopped

  ##########################################################
  # vLLM Chat (CUDA)
  ##########################################################
  vllm-chat-cuda:
    profiles: ["cuda-vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
    image: docint-vllm-openai:latest
    env_file:
      - .env.docker
    ipc: host
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        export CUDA_VISIBLE_DEVICES="$${VLLM_CHAT_CUDA_VISIBLE_DEVICES:-0}";
        set -- vllm serve "$${TEXT_MODEL:-$${LLM:-Qwen/Qwen3.5-2B}}"
        --api-key "$${OPENAI_API_KEY:-sk-no-key-required}"
        --host 0.0.0.0
        --port 8000
        --gpu-memory-utilization "$${VLLM_CHAT_GPU_MEMORY_UTILIZATION:-0.9}"
        --max-model-len "$${VLLM_CHAT_MAX_MODEL_LEN:-4096}"
        --chat-template-content-format "$${VLLM_CHAT_TEMPLATE_CONTENT_FORMAT:-openai}";
        if [ "$${VLLM_CHAT_ENABLE_PREFIX_CACHING:-true}" = "true" ]; then
          set -- "$@" --enable-prefix-caching;
        fi;
        if [ -n "$${VLLM_CHAT_DEFAULT_CHAT_TEMPLATE_KWARGS:-}" ]; then
          set -- "$@" --default-chat-template-kwargs "$${VLLM_CHAT_DEFAULT_CHAT_TEMPLATE_KWARGS}";
        fi;
        if [ -n "$${VLLM_CHAT_LIMIT_MM_PER_PROMPT:-}" ]; then
          set -- "$@" --limit-mm-per-prompt "$${VLLM_CHAT_LIMIT_MM_PER_PROMPT}";
        fi;
        exec "$@"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    runtime: nvidia
    networks:
      docint-net:
        aliases:
          - vllm-chat
    restart: unless-stopped

  ##########################################################
  # vLLM Embeddings (CUDA)
  ##########################################################
  vllm-embed-cuda:
    profiles: ["cuda-vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
    image: docint-vllm-openai:latest
    env_file:
      - .env.docker
    ipc: host
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        export CUDA_VISIBLE_DEVICES="$${VLLM_EMBED_CUDA_VISIBLE_DEVICES:-0}";
        exec vllm serve "$${EMBED_MODEL:-BAAI/bge-m3}"
        --api-key "$${OPENAI_API_KEY:-sk-no-key-required}"
        --host 0.0.0.0
        --port 8000
        --runner "$${VLLM_EMBED_RUNNER:-pooling}"
        --convert "$${VLLM_EMBED_CONVERT:-embed}"
        --gpu-memory-utilization "$${VLLM_EMBED_GPU_MEMORY_UTILIZATION:-0.5}"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    runtime: nvidia
    networks:
      docint-net:
        aliases:
          - vllm-embed
    restart: unless-stopped

  ##########################################################
  # vLLM Rerank (CUDA)
  ##########################################################
  vllm-rerank-cuda:
    profiles: ["cuda-vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
    image: docint-vllm-openai:latest
    env_file:
      - .env.docker
    ipc: host
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        export CUDA_VISIBLE_DEVICES="$${VLLM_RERANK_CUDA_VISIBLE_DEVICES:-0}";
        exec vllm serve "$${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}"
        --api-key "$${OPENAI_API_KEY:-sk-no-key-required}"
        --host 0.0.0.0
        --port 8000
        --runner "$${VLLM_RERANK_RUNNER:-pooling}"
        --gpu-memory-utilization "$${VLLM_RERANK_GPU_MEMORY_UTILIZATION:-0.3}"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    volumes:
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    runtime: nvidia
    networks:
      docint-net:
        aliases:
          - vllm-rerank
    restart: unless-stopped
    
  ##########################################################
  # Frontend (Streamlit)
  ##########################################################
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: streamlit run docint/app.py --server.address 0.0.0.0
    ports:
      - 8501:8501
    environment:
      - BACKEND_HOST=http://backend-net:8000
      - BACKEND_PUBLIC_HOST=http://localhost:8000
      - LOG_PATH=/app/.logs/frontend.log
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      - ${USERPROFILE:-$HOME}/docint/data:/app/data
      - ${USERPROFILE:-$HOME}/docint/results:/app/results
      - docint-logs:/app/.logs
    networks:
      - docint-net

  ##########################################################
  # Qdrant
  ##########################################################
  qdrant-cpu:
    <<: *qdrant-cpu
    profiles: ["cpu-ollama", "cpu-openai"]

  qdrant-cuda:
    <<: *qdrant-cuda
    profiles: ["cuda-ollama", "cuda-openai", "cuda-vllm"]

##########################################################
# Volumes
##########################################################
volumes:
  docint-logs:
  model-cache:
  ollama-models:
  qdrant-snapshots:
  qdrant-storage:

##########################################################
# Networks
##########################################################
networks:
  docint-net:
