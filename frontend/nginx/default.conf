server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # Defer upstream DNS resolution to request time via Docker's embedded
    # resolver. Without this, nginx resolves "backend" at config-load time
    # and crashes if the backend container is not yet up (or its IP later
    # changes after a restart).
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/xml font/woff2;

    # ---- Backend API: JSON endpoints (proxied to FastAPI) ----
    # Excludes the SSE endpoints below by listing them first via more-specific
    # locations (exact match `=` and prefix `^~` beat regex locations).
    location ~ ^/(collections|sessions|reports|sources|query|summarize|agent|config|docs|openapi\.json|redoc)(/|$) {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/security-headers.conf;
    }

    # ---- Backend API: streaming (SSE) ----
    # gzip stays off (SSE is not in gzip_types but explicit is safer),
    # proxy_buffering off so each token frame flushes to the client, and
    # proxy_request_buffering off so the JSON request body forwards without
    # waiting for the full body — none of these requests are big enough to
    # justify request buffering.
    location = /stream_query {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        gzip off;
        include /etc/nginx/security-headers.conf;
    }

    location = /summarize/stream {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        gzip off;
        include /etc/nginx/security-headers.conf;
    }

    # ---- Backend API: ingestion (large uploads + SSE) ----
    location ~ ^/ingest(/|$) {
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # This applies to the whole multipart request, not each file.
        client_max_body_size ${DOCINT_CLIENT_MAX_BODY_SIZE};
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        gzip off;
        include /etc/nginx/security-headers.conf;
    }

    # ---- Hashed assets: immutable long-lived cache ----
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        include /etc/nginx/security-headers.conf;
        try_files $uri =404;
    }

    # ---- SPA shell: never cache, fall back to index.html for client routes ----
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }
}
