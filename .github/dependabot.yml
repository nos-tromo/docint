version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-dependencies:
        patterns:
          - "*"
    # mypy and ruff are centrally pinned in nos-tromo/.github/configs/
    # python-strict/ and mirrored into pyproject.toml; the strict-config CI
    # check fails on any local drift. They move only when the canonical
    # config moves (manual re-mirror), never via an automated bump here.
    ignore:
      - dependency-name: "mypy"
      - dependency-name: "ruff"
      - dependency-name: "pillow"
        versions: [">= 12.0.0"]
      - dependency-name: "numpy"
        versions: [">= 2.4.0"]
      # transformers is capped <5.9 in pyproject.toml: docling 2.102.1
      # (docling-core[chunking]) requires transformers<5.9.0, so bumping past
      # it makes `uv lock` unsatisfiable. Lift once docling allows transformers
      # >=5.9 (i.e. docling-slim depends on docling-core>=3.0).
      - dependency-name: "transformers"
        versions: [">= 5.9.0"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
