name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v2.3 (local mypy hook so strict mode sees project deps;
    # v2.3 fixes github.job_workflow_ref usage in the lint job).
    # Canonical at nos-tromo/.github/configs/python-strict/.
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v2.3
    with:
      python-versions: '["3.11"]'
      uv-sync-args: '--frozen --group dev --extra cpu'
      docker-build: true
      docker-compose-profiles: '--profile cpu'
      frontend-build: true
      frontend-dir: 'frontend'
      node-version: '20'
      pnpm-version: '9.12.0'
