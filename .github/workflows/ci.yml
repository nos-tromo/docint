name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v2.6 (local mypy hook so strict mode sees project deps + the
    # make/common.mk drift-check). Canonical configs at
    # nos-tromo/.github/configs/{python-strict,make-common}/.
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v2.6
    with:
      python-versions: '["3.11"]'
      uv-sync-args: '--frozen --group dev'
      docker-build: true
      frontend-build: true
      frontend-dir: 'frontend'
      node-version: '20'
      pnpm-version: '9.12.0'
