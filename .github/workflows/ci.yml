name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    # Pinned to v1 (latest stable v1.x.y).
    uses: nos-tromo/.github/.github/workflows/python-app-ci.yml@v1
    with:
      python-versions: '["3.11"]'
      uv-sync-args: '--frozen --group dev --extra cpu'
      docker-build: true
      docker-compose-profiles: '--profile cpu'
      frontend-build: true
      frontend-dir: 'frontend'
      node-version: '20'
      pnpm-version: '9.12.0'
