name: Frontend CI

permissions:
  contents: read

on:
  push:
    branches: [main, tests]
    paths:
      - 'frontend/**'
      - 'docker/Dockerfile.frontend'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, tests]
    paths:
      - 'frontend/**'
      - 'docker/Dockerfile.frontend'
      - '.github/workflows/frontend-ci.yml'

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      # Match the toolchain pinned in docker/Dockerfile.frontend (node:20-alpine,
      # pnpm@9.12.0) and frontend/package.json's packageManager field.
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.12.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build (typecheck + bundle)
        run: pnpm build

  build-frontend-image:
    needs: test-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: docint-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
