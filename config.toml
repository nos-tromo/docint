active_profile = "local-ollama"

# Profile-specific settings
# Available profiles: 
# local-ollama
# local-openai
# docker-cpu-ollama
# docker-cpu-openai
# docker-cuda-ollama
# docker-cuda-vllm
# docker-cuda-openai

##################################################################
# local-ollama
##################################################################

[profiles.local-ollama.shared.runtime]
docint_offline = true
preload_models = false

[profiles.local-ollama.shared.frontend]
collection_timeout = 120

[profiles.local-ollama.shared.inference]
provider = "ollama"
api_base = "http://localhost:11434/v1"
ctx_window = 4096
max_retries = 2
reuse_client = false
seed = 42
temperature = 0.0
thinking_effort = "medium"
thinking_enabled = false
timeout = 300.0
top_p = 0.1

[profiles.local-ollama.shared.models]
embed_model = "bge-m3"
image_embed_model = "openai/clip-vit-base-patch32"
ner_model = "gliner-community/gliner_large-v2.5"
rerank_model = "BAAI/bge-reranker-v2-m3"
sparse_model = "Qdrant/all_miniLM_L6_v2_with_attentions"
text_model = "gpt-oss:20b"
vision_model = "qwen3.5:9b"
whisper_model = "turbo"

[profiles.local-ollama.shared.graphrag]
enabled = true
neighbor_hops = 2
top_k_nodes = 50
min_edge_weight = 3
max_neighbors = 6

[profiles.local-ollama.shared.hate_speech]
enabled = false
max_chars = 2048
max_workers = 1

[profiles.local-ollama.shared.image_ingestion]
enabled = true
embedding_enabled = true
tagging_enabled = true
collection_name = "{collection}_images"
vector_name = "image-dense"
cache_by_hash = true
fail_on_embedding_error = false
fail_on_tagging_error = false
retrieve_top_k = 5
tagging_max_image_dimension = 1024

[profiles.local-ollama.shared.ingestion]
coarse_chunk_size = 8192
docling_accelerator_num_threads = 4
docstore_batch_size = 100
ingest_benchmark_enabled = false
docstore_max_retries = 3
docstore_retry_backoff_seconds = 0.25
docstore_retry_backoff_max_seconds = 2.0
fine_chunk_overlap = 0
fine_chunk_size = 8192
hierarchical_chunking_enabled = true
ingestion_batch_size = 50
sentence_splitter_chunk_overlap = 64
sentence_splitter_chunk_size = 1024
supported_filetypes = [".avi", ".csv", ".docx", ".flv", ".gif", ".jpeg", ".jpg", ".jsonl", ".m4a", ".m4v", ".md", ".mkv", ".mov", ".mp3", ".mp4", ".mpeg", ".mpg", ".ogg", ".parquet", ".pdf", ".png", ".tsv", ".txt", ".wav", ".webm", ".wmv", ".xls", ".xlsx"]

[profiles.local-ollama.shared.ner]
enabled = true
max_chars = 1024
max_workers = 4

[profiles.local-ollama.shared.pipeline]
text_coverage_threshold = 0.01
pipeline_version = "1.0.0"
max_retries = 2
force_reprocess = false
max_workers = 4
enable_vision_ocr = true
vision_ocr_timeout = 60.0
vision_ocr_max_retries = 1
vision_ocr_max_image_dimension = 1024
vision_ocr_max_tokens = 4096

[profiles.local-ollama.shared.response_validation]
enabled = true

[profiles.local-ollama.shared.retrieval]
rerank_use_fp16 = false
retrieve_top_k = 20
chat_response_mode = "auto"
vector_store_query_mode = "auto"
hybrid_alpha = 0.5
sparse_top_k = 20
hybrid_top_k = 20
parent_context_enabled = true

[profiles.local-ollama.shared.summary]
coverage_target = 0.7
max_docs = 30
per_doc_top_k = 4
final_source_cap = 24
social_chunking_enabled = true
social_candidate_pool = 48
social_diversity_limit = 2

[profiles.local-ollama.shared.whisper]
max_workers = 1
task = "transcribe"

[profiles.local-ollama.backend.hosts]
backend_host = "http://localhost:8000"
backend_public_host = "http://localhost:8000"
qdrant_host = "http://localhost:6333"
cors_allowed_origins = "http://localhost:8501,http://127.0.0.1:8501"

[profiles.local-ollama.backend.paths]
artifacts = "~/docint/artifacts"
data = "~/docint/data"
docint_home_dir = "~/docint"
logs = "${PROJECT_ROOT}/.logs/backend.log"
queries = "~/docint/queries.txt"
results = "~/docint/results"
qdrant_sources = "~/docint/qdrant_sources"
hf_hub_cache = "~/.cache/huggingface/hub"

[profiles.local-ollama.frontend.hosts]
backend_host = "http://localhost:8000"
backend_public_host = "http://localhost:8000"
qdrant_host = "http://localhost:6333"
cors_allowed_origins = "http://localhost:8501,http://127.0.0.1:8501"

[profiles.local-ollama.frontend.paths]
artifacts = "~/docint/artifacts"
data = "~/docint/data"
docint_home_dir = "~/docint"
logs = "${PROJECT_ROOT}/.logs/frontend.log"
queries = "~/docint/queries.txt"
results = "~/docint/results"
qdrant_sources = "~/docint/qdrant_sources"
hf_hub_cache = "~/.cache/huggingface/hub"

[profiles.local-ollama.worker.hosts]
backend_host = "http://localhost:8000"
backend_public_host = "http://localhost:8000"
qdrant_host = "http://localhost:6333"
cors_allowed_origins = "http://localhost:8501,http://127.0.0.1:8501"

[profiles.local-ollama.worker.paths]
artifacts = "~/docint/artifacts"
data = "~/docint/data"
docint_home_dir = "~/docint"
logs = "${PROJECT_ROOT}/.logs/worker.log"
queries = "~/docint/queries.txt"
results = "~/docint/results"
qdrant_sources = "~/docint/qdrant_sources"
hf_hub_cache = "~/.cache/huggingface/hub"

