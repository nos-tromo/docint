name: docint

##########################################################
# Shared backend fragments (YAML anchors)
##########################################################
x-no-proxy-env: &no-proxy-env
  NO_PROXY: "backend,qdrant,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"
  no_proxy: "backend,qdrant,localhost,127.0.0.1,172.16.0.0/12,10.0.0.0/8${EXTRA_NO_PROXY:-}"

x-env-file: &env-file
  - ../.env

services:
  ##########################################################
  # Backend – CPU
  ##########################################################
  backend-cpu:
    image: docint-backend-cpu:${DOCINT_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.cpu
    expose:
      - "8000"
    environment:
      <<: *no-proxy-env
      LOG_PATH: /var/log/docint/backend-cpu.log
      QDRANT_HOST: http://qdrant:6333
      QDRANT_SRC_DIR: /var/lib/docint/sources
      SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
      USE_DEVICE: ${USE_DEVICE:-cpu}
    env_file: *env-file
    volumes: &backend-volumes
      - docint-logs:/var/log/docint
      - docling-cache:/root/.cache/docling
      - huggingface-cache:/root/.cache/huggingface/hub
      - qdrant-sources:/var/lib/docint/sources
      - sessions-storage:/var/lib/docint/sessions
    networks: &backend-networks
      docint-net:
        aliases:
          - backend
      data-net:
        aliases:
          - docint-backend
      inference-net:
        aliases:
          - docint-backend
    restart: unless-stopped
    profiles: ["cpu"]

  ##########################################################
  # Backend – CUDA
  ##########################################################
  backend-cuda:
    image: docint-backend-cuda:${DOCINT_VERSION:-latest}
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend.cuda
    expose:
      - "8000"
    environment:
      <<: *no-proxy-env
      LOG_PATH: /var/log/docint/backend-cuda.log
      NVIDIA_VISIBLE_DEVICES: all
      QDRANT_HOST: http://qdrant:6333
      QDRANT_SRC_DIR: /var/lib/docint/sources
      SESSIONS_DB_PATH: /var/lib/docint/sessions/sessions.sqlite3
      USE_DEVICE: ${USE_DEVICE:-auto}
    env_file: *env-file
    volumes: *backend-volumes
    networks: *backend-networks
    restart: unless-stopped
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [cuda]
    profiles: ["cuda"]

  ##########################################################
  # Frontend SPA – nginx serves the React build and reverse-
  # proxies API routes to the backend on the docint-net network.
  ##########################################################
  frontend-cpu:
    image: docint-frontend:${DOCINT_VERSION:-latest}
    build: &frontend-build
      context: ..
      dockerfile: docker/Dockerfile.frontend
    networks: &frontend-networks
      docint-net:
        aliases:
          - frontend
    depends_on:
      - backend-cpu
    restart: unless-stopped
    profiles: ["cpu"]

  frontend-cuda:
    image: docint-frontend:${DOCINT_VERSION:-latest}
    build: *frontend-build
    networks: *frontend-networks
    depends_on:
      - backend-cuda
    restart: unless-stopped
    profiles: ["cuda"]

##########################################################
# Volumes
##########################################################
volumes:
  docint-logs:
  docling-cache:
    external: true
  huggingface-cache:
    external: true
  ollama-cache:
    external: true
  qdrant-sources:
    external: true
  sessions-storage:
    external: true

##########################################################
# Networks
##########################################################
networks:
  docint-net:
  data-net:
    external: true
    name: ${DATA_NET:-data-net}
  inference-net:
    external: true
    name: ${INFERENCE_NET:-inference-net}
