server {
    listen 9000;
    server_name _;

    client_max_body_size 32m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;

    location = /v1/audio/transcriptions {
        proxy_pass http://vllm-audio:8000/v1/audio/transcriptions;
    }

    location = /v1/audio/translations {
        proxy_pass http://vllm-audio:8000/v1/audio/translations;
    }

    location = /v1/chat/completions {
        proxy_pass http://vllm-chat:8000/v1/chat/completions;
    }

    location = /v1/completions {
        proxy_pass http://vllm-chat:8000/v1/completions;
    }

    location = /v1/embeddings {
        proxy_pass http://vllm-embed:8000/v1/embeddings;
    }

    location = /v1/models {
        proxy_pass http://vllm-chat:8000/v1/models;
    }

    location = /v1/rerank {
        proxy_pass http://vllm-rerank:8000/v1/rerank;
    }

    location = /pooling {
        proxy_pass http://vllm-embed:8000/pooling;
    }

    location = /tokenize {
        proxy_pass http://vllm-embed:8000/tokenize;
    }
}
