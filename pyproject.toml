[project]
name = "docint"
version = "0.1.0"
description = "Proof of concept RAG application"
authors = [
  { name = "nos-tromo" }
]
requires-python = ">=3.11,<3.12"
license = "Apache-2.0"
dependencies = [
  "cryptography>=46.0.7",
  "docling>=2.86.0",
  "fastapi>=0.135.3",
  "fastembed>=0.8.0",
  "fastparquet>=2026.3.0",
  "flagembedding>=1.4.0",
  "gliner>=0.2.23",
  "huggingface-hub>=0.26,<1.0",
  "llama-index>=0.14.20",
  "llama-index-embeddings-huggingface>=0.7.0",
  "llama-index-embeddings-openai>=0.6.0",
  "llama-index-llms-openai>=0.7.5",
  "llama-index-node-parser-docling>=0.4.2",
  "llama-index-postprocessor-flag-embedding-reranker>=0.5.0",
  "llama-index-readers-docling>=0.4.2",
  "llama-index-vector-stores-qdrant>=0.10.0",
  "loguru>=0.7.3",
  "numba>=0.65.0",
  "numpy>=2.3.5,<2.4",
  "ollama>=0.6.1",
  "openai>=2.31.0",
  "opencv-python-headless>=4.13.0.92",
  "pandas>=3.0.2",
  "pillow>=11.3.0,<12.0.0",
  "pyarrow>=23.0.1",
  "pydantic>=2.12.5",
  "pypdf>=6.10.0",
  "python-dotenv>=1.2.2",
  "python-magic>=0.4.27",
  "python-multipart>=0.0.26",
  "qdrant-client>=1.17.1",
  "requests>=2.33.1",
  "sqlalchemy>=2.0.49",
  "streamlit>=1.56.0",
  # Capped below 5.0 because FlagEmbedding (via
  # llama-index-postprocessor-flag-embedding-reranker) still calls
  # ``PreTrainedTokenizerBase.prepare_for_model``, which was removed in
  # transformers 5.x. Accepted known risk: CVE-2025-14926 (unfixed RCE in
  # ``transformers.utils.convert_config``) is reachable only when loading
  # untrusted checkpoint configs; docint resolves models from a pre-populated
  # local HF cache or trusted BAAI/HuggingFace repos. Revisit if (a) an
  # operator needs to point MODEL_* env vars at untrusted repos, or
  # (b) a 4.x patch release (or a FlagEmbedding>=1.5 with transformers-5
  # tokenizer compat) ships upstream.
  "transformers>=4.44.2,<5.0",
  "uvicorn>=0.44.0",
  "watchdog>=6.0.0",
]

[project.urls]
Repository = "https://github.com/nos-tromo/docint.git"

[project.scripts]
docint = "docint.app:run"
ingest = "docint.cli.ingest:main"
query = "docint.cli.query:main"
query-eval = "docint.cli.eval:main"
verify = "docint.cli.verify:main"
load-models = "docint.utils.model_cfg:main"

[project.optional-dependencies]
cpu = [
  "torch>=2.11.0",
  "torchvision>=0.26.0",
]
cuda = [
  "torch>=2.11.0",
  "torchvision>=0.26.0",
  "fastembed-gpu",
  "onnxruntime-gpu",
]

[dependency-groups]
dev = [
    "mypy>=1.20.0",
    "pre-commit>=4.5.1",
    "pytest>=9.0.3",
    "ruff==0.15.10",
]

[build-system]
requires = ["setuptools>=82.0.1", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["docint*"]

[tool.uv]
package = true
conflicts = [
  [{ extra = "cpu" }, { extra = "cuda" }],
]

[tool.uv.sources]
docint = { workspace = true }
torch = [
  { index = "pytorch-cu130", extra = "cuda" },
  { index = "pytorch-cpu", extra = "cpu" },
]
torchvision = [
  { index = "pytorch-cu130", extra = "cuda" },
  { index = "pytorch-cpu", extra = "cpu" },
]

[[tool.uv.index]]
name = "pytorch-cu130"
url = "https://download.pytorch.org/whl/cu130"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true
